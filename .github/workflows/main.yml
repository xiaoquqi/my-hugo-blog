name: Deploy to Tencent Cloud Object Storage

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build

      - name: Install Tencent Object Storage CLI
        run: |
          curl -L https://github.com/tencentyun/coscli/releases/download/v0.12.0-beta/coscli-linux -o ~/coscli
          chmod 755 ~/coscli

      - name: Set Tencent Object Storage Auth
        run: |
          touch ~/.cos.yaml
          ~/coscli config set --secret_id ${{ secrets.SECRETID }} --secret_key ${{ secrets.SECRETKEY }}

      - name: Set Tencent Object Storage Bucket
        run: ~/coscli config add -b sunqi-site-1254137673 -r ap-beijing

      - name: Upload to Tencent Object Storage
        run: cd dist && ~/coscli sync . cos://sunqi-site-1254137673 -r
