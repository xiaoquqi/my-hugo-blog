# Configuration
baseURL: "https://sunqi.site/"
title: "IT技术文章分享"

enableRobotsTXT: true
# Parse Git commit
enableGitInfo: true
# enableEmoji: false
hasCJKLanguage: true

services:
  googleAnalytics:
    ID: 27290906

outputs:
  home: [HTML]
  page: [HTML]
  section: [HTML, RSS]

defaultContentLanguage: zh-cn
languages:
  en:
    label: English
    weight: 2
    title: Old Sun’s Straight-faced Nonsense
  es:
    label: Español
    weight: 3
    title: Las Reflexiones de Lao Sun
  zh-cn:
    label: 简体中文
    locale: zh-CN
    weight: 1
    title: IT技术文章分享

module:
  hugoVersion:
    extended: true
    min: "0.134.0"

  imports:
    - path: github.com/imfing/hextra

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ['$$', '$$']]
          inline: [['\(', '\)']]
        enable: true

enableInlineShortcodes: true

menu:
  main:
    - identifier: ai
      name: AI Insights
      pageRef: /ai
      weight: 1
      params:
        icon: sparkles
    - identifier: documentation
      name: Cloud DR
      pageRef: /docs
      weight: 2
      params:
        icon: cloud
    - identifier: training
      name: Training
      pageRef: /training
      weight: 3
      params:
        icon: academic-cap
    - identifier: blog
      name: Blog
      pageRef: /blog
      weight: 4
      params:
        icon: pencil
    - identifier: about
      name: About
      pageRef: /about
      weight: 5
      params:
        icon: user
    - name: Search
      weight: 6
      params:
        type: search
    - name: GitHub
      weight: 7
      url: "https://github.com/xiaoquqi/my-hugo-blog"
      params:
        icon: github

  sidebar:
    - identifier: more
      name: More
      params:
        type: separator
      weight: 1
    - identifier: about
      name: "About"
      pageRef: "/about"
      weight: 2
    - identifier: hugoDocs
      name: "Hugo Docs ↗"
      url: "https://gohugo.io/documentation/"
      weight: 3

params:
  description: 老孙正经胡说，一名技术从业者的避风港湾。

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/logo.png
      dark: images/logo.png
      # width: 40
      # height: 20
      # link: /
    width: wide

  page:
    # full (100%), wide (90rem), normal (1280px)
    width: wide

  theme:
    # light | dark | system
    default: system
    displayToggle: true

  footer:
    enable: true
    displayCopyright: false
    displayPoweredBy: false
    width: full

  # Display the last modification date
  displayUpdatedDate: true
  dateFormat: "2006-01-02"

  # Search
  # flexsearch is enabled by default
  search:
    enable: true
    type: flexsearch

    flexsearch:
      # index page by: content | summary | heading | title
      index: content
      # full | forward | reverse | strict
      # https://github.com/nextapps-de/flexsearch/#tokenizer-prefix-search
      tokenize: forward

  editURL:
    enable: true
    base: "https://github.com/xiaoquqi/my-hugo-blog/edit/master/content"

  blog:
    list:
      displayTags: true
      # date | lastmod | publishDate | title | weight
      sortBy: date
      sortOrder: desc # or "asc"

    article:
      displayPagination: true

  highlight:
    copy:
      enable: true
      # hover | always
      display: hover

  comments:
    enable: false
    type: giscus

    # https://giscus.app/
    giscus:
      repo: xiaoquqi/my-hugo-blog
      repoId: R_kgDOGctbOQ
      category: General
      categoryId: DIC_kwDOGctbOc4CnjFX
      # mapping: pathname
      # strict: 0
      # reactionsEnabled: 1
      # emitMetadata: 0
      # inputPosition: top
      lang: zh-CN
      # theme: noborder_dark
