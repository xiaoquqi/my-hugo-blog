<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="gold-arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#EDD07C"/>
    </marker>
  </defs>

  <rect width="1200" height="400" fill="#0C0A14"/>

  <!-- top strip -->
  <rect width="1200" height="44" fill="rgba(201,168,76,0.04)"/>
  <text x="600" y="27" text-anchor="middle" fill="#C9A84C" font-size="11" letter-spacing="5" font-weight="500"
        font-family="Arial,Helvetica,sans-serif">FRAGMENTED  →  UNIFIED</text>

  <!-- ======================================================
       LEFT: 4 scattered puzzle-like pieces, rotated, with gaps
       ====================================================== -->

  <!-- Piece TL – rotated -18° around its center (185, 178) -->
  <g transform="rotate(-18, 185, 178)">
    <rect x="125" y="118" width="120" height="120" rx="14" fill="rgba(155,126,223,0.12)" stroke="#9B7EDF" stroke-width="4"/>
    <!-- tab right -->
    <circle cx="245" cy="178" r="18" fill="rgba(155,126,223,0.12)" stroke="#9B7EDF" stroke-width="3.5"/>
    <!-- tab bottom -->
    <circle cx="185" cy="238" r="18" fill="rgba(155,126,223,0.12)" stroke="#9B7EDF" stroke-width="3.5"/>
    <text x="185" y="185" text-anchor="middle" fill="#9B7EDF" font-size="28" font-weight="700" font-family="Arial">1</text>
  </g>

  <!-- Piece TR – rotated +14° around its center (402, 168) -->
  <g transform="rotate(14, 402, 168)">
    <rect x="342" y="108" width="120" height="120" rx="14" fill="rgba(201,168,76,0.1)" stroke="#C9A84C" stroke-width="4"/>
    <!-- notch left (covered by rect offset) -->
    <circle cx="342" cy="168" r="18" fill="#0C0A14" stroke="#C9A84C" stroke-width="3.5"/>
    <!-- tab bottom -->
    <circle cx="402" cy="228" r="18" fill="rgba(201,168,76,0.1)" stroke="#C9A84C" stroke-width="3.5"/>
    <text x="402" y="175" text-anchor="middle" fill="#C9A84C" font-size="28" font-weight="700" font-family="Arial">2</text>
  </g>

  <!-- Piece BL – rotated -10° around its center (178, 308) -->
  <g transform="rotate(-10, 178, 308)">
    <rect x="118" y="248" width="120" height="120" rx="14" fill="rgba(63,168,108,0.1)" stroke="#3FA86C" stroke-width="4"/>
    <!-- notch top -->
    <circle cx="178" cy="248" r="18" fill="#0C0A14" stroke="#3FA86C" stroke-width="3.5"/>
    <!-- tab right -->
    <circle cx="238" cy="308" r="18" fill="rgba(63,168,108,0.1)" stroke="#3FA86C" stroke-width="3.5"/>
    <text x="178" y="316" text-anchor="middle" fill="#3FA86C" font-size="28" font-weight="700" font-family="Arial">3</text>
  </g>

  <!-- Piece BR – rotated +16° around its center (408, 305) -->
  <g transform="rotate(16, 408, 305)">
    <rect x="348" y="245" width="120" height="120" rx="14" fill="rgba(63,168,212,0.1)" stroke="#4BA8D8" stroke-width="4"/>
    <!-- notch top -->
    <circle cx="408" cy="245" r="18" fill="#0C0A14" stroke="#4BA8D8" stroke-width="3.5"/>
    <!-- notch left -->
    <circle cx="348" cy="305" r="18" fill="#0C0A14" stroke="#4BA8D8" stroke-width="3.5"/>
    <text x="410" y="314" text-anchor="middle" fill="#4BA8D8" font-size="28" font-weight="700" font-family="Arial">4</text>
  </g>

  <!-- lightning/friction between scattered pieces -->
  <text x="296" y="240" text-anchor="middle" fill="rgba(212,128,58,0.7)" font-size="28">⚡</text>

  <!-- ======================================================
       CENTER ARROW
       ====================================================== -->
  <line x1="548" y1="212" x2="618" y2="212" stroke="#EDD07C" stroke-width="3" marker-end="url(#gold-arr)"/>

  <!-- ======================================================
       RIGHT: 4 pieces clicked together perfectly
       ====================================================== -->
  <!-- Unified glow behind -->
  <rect x="665" y="112" width="252" height="252" rx="18" fill="none" stroke="rgba(63,168,108,0.35)" stroke-width="6"/>

  <!-- TL piece (no rotation) -->
  <g>
    <rect x="665" y="112" width="122" height="122" rx="14" fill="rgba(155,126,223,0.15)" stroke="#9B7EDF" stroke-width="3.5"/>
    <!-- tab right (sticks into TR slot) -->
    <circle cx="787" cy="173" r="17" fill="rgba(155,126,223,0.15)" stroke="#9B7EDF" stroke-width="3"/>
    <!-- tab bottom (sticks into BL slot) -->
    <circle cx="726" cy="234" r="17" fill="rgba(155,126,223,0.15)" stroke="#9B7EDF" stroke-width="3"/>
    <text x="726" y="180" text-anchor="middle" fill="#9B7EDF" font-size="28" font-weight="700" font-family="Arial">1</text>
  </g>

  <!-- TR piece -->
  <g>
    <rect x="795" y="112" width="122" height="122" rx="14" fill="rgba(201,168,76,0.13)" stroke="#C9A84C" stroke-width="3.5"/>
    <!-- notch left (accepts TL tab) -->
    <circle cx="795" cy="173" r="17" fill="#0C0A14"/>
    <!-- tab bottom -->
    <circle cx="856" cy="234" r="17" fill="rgba(201,168,76,0.13)" stroke="#C9A84C" stroke-width="3"/>
    <text x="856" y="180" text-anchor="middle" fill="#C9A84C" font-size="28" font-weight="700" font-family="Arial">2</text>
  </g>

  <!-- BL piece -->
  <g>
    <rect x="665" y="242" width="122" height="122" rx="14" fill="rgba(63,168,108,0.13)" stroke="#3FA86C" stroke-width="3.5"/>
    <!-- notch top (accepts TL bottom tab) -->
    <circle cx="726" cy="242" r="17" fill="#0C0A14"/>
    <!-- tab right -->
    <circle cx="787" cy="303" r="17" fill="rgba(63,168,108,0.13)" stroke="#3FA86C" stroke-width="3"/>
    <text x="726" y="310" text-anchor="middle" fill="#3FA86C" font-size="28" font-weight="700" font-family="Arial">3</text>
  </g>

  <!-- BR piece -->
  <g>
    <rect x="795" y="242" width="122" height="122" rx="14" fill="rgba(63,168,212,0.13)" stroke="#4BA8D8" stroke-width="3.5"/>
    <!-- notch top -->
    <circle cx="856" cy="242" r="17" fill="#0C0A14"/>
    <!-- notch left -->
    <circle cx="795" cy="303" r="17" fill="#0C0A14"/>
    <text x="856" y="310" text-anchor="middle" fill="#4BA8D8" font-size="28" font-weight="700" font-family="Arial">4</text>
  </g>

  <!-- "perfect fit" glow lines -->
  <rect x="660" y="107" width="264" height="264" rx="20" fill="none" stroke="rgba(63,168,108,0.5)" stroke-width="2.5"/>

  <!-- ✓ badge on the unified set -->
  <circle cx="978" cy="212" r="28" fill="rgba(63,168,108,0.15)" stroke="#3FA86C" stroke-width="3"/>
  <polyline points="963,212 973,225 996,196" fill="none" stroke="#3FA86C" stroke-width="4"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- right-side person (one person, unified view) -->
  <g transform="translate(1110, 212)">
    <circle r="36" fill="#101E14" stroke="#3FA86C" stroke-width="4"/>
    <circle cx="-12" cy="-8" r="6" fill="#ECE6D8"/>
    <circle cx="12"  cy="-8" r="6" fill="#ECE6D8"/>
    <path d="M -14,10 Q 0,28 14,10" fill="none" stroke="#ECE6D8" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- knowledge rays from right person -->
  <line x1="1074" y1="192" x2="1042" y2="178" stroke="rgba(201,168,76,0.5)" stroke-width="2" stroke-linecap="round"/>
  <line x1="1074" y1="212" x2="1042" y2="212" stroke="rgba(201,168,76,0.5)" stroke-width="2" stroke-linecap="round"/>
  <line x1="1074" y1="232" x2="1042" y2="246" stroke="rgba(201,168,76,0.5)" stroke-width="2" stroke-linecap="round"/>
  <text x="1110" y="272" text-anchor="middle" fill="rgba(63,168,108,0.6)" font-size="11" font-weight="600"
        font-family="Arial,Helvetica,sans-serif">SOLO × AI</text>
</svg>
