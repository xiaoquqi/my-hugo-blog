<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="gold-arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#C9A84C"/>
    </marker>
    <linearGradient id="leftFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9B7EDF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#9B7EDF" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="rightFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.14"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="360" fill="#0C0A14"/>

  <!-- Top eyebrow -->
  <rect width="1200" height="44" fill="rgba(201,168,76,0.04)"/>
  <text x="600" y="27" text-anchor="middle" fill="#C9A84C" font-size="11.5" letter-spacing="4" font-weight="500"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">
    任务拆分的标准正在发生迁移
  </text>

  <!-- Left panel: 过去 -->
  <rect x="28" y="54" width="480" height="278" rx="10" fill="url(#leftFade)" stroke="rgba(155,126,223,0.18)" stroke-width="1"/>

  <!-- Left header -->
  <rect x="48" y="74" width="80" height="24" rx="4" fill="rgba(155,126,223,0.15)"/>
  <text x="88" y="91" text-anchor="middle" fill="#9B7EDF" font-size="11.5" font-weight="600" letter-spacing="1"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">过 去</text>

  <text x="268" y="103" text-anchor="middle" fill="#ECE6D8" font-size="17" font-weight="600"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">按功能模块拆分</text>

  <line x1="68" y1="116" x2="488" y2="116" stroke="rgba(155,126,223,0.15)" stroke-width="1"/>

  <!-- Left items -->
  <text x="88" y="148" fill="#8C7E6A" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">拆分标准</text>
  <text x="240" y="148" fill="#ECE6D8" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">前端 / 后端 / 测试 / 设计 角色边界</text>

  <line x1="68" y1="162" x2="488" y2="162" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <text x="88" y="191" fill="#8C7E6A" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">核心假设</text>
  <text x="240" y="191" fill="#ECE6D8" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">模块间通过接口和沟通解耦</text>

  <line x1="68" y1="205" x2="488" y2="205" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <text x="88" y="234" fill="#8C7E6A" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">协作方式</text>
  <text x="240" y="234" fill="#ECE6D8" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">分工明确，定期同步进展</text>

  <line x1="68" y1="248" x2="488" y2="248" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <text x="88" y="277" fill="#8C7E6A" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">主要成本</text>
  <text x="240" y="277" fill="#D94F4F" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">跨模块业务理解对齐</text>

  <line x1="68" y1="291" x2="488" y2="291" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <text x="88" y="318" fill="#8C7E6A" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">适合场景</text>
  <text x="240" y="318" fill="#ECE6D8" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">接口清晰、无需反复解释业务</text>

  <!-- Center arrow -->
  <line x1="530" y1="192" x2="660" y2="192" stroke="#C9A84C" stroke-width="2" marker-end="url(#gold-arr)"/>
  <rect x="527" y="208" width="140" height="22" rx="4" fill="rgba(201,168,76,0.08)"/>
  <text x="597" y="223" text-anchor="middle" fill="#C9A84C" font-size="11" letter-spacing="1"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">AI 改变了前提</text>

  <!-- Right panel: AI时代 -->
  <rect x="692" y="54" width="480" height="278" rx="10" fill="url(#rightFade)" stroke="rgba(201,168,76,0.22)" stroke-width="1"/>

  <!-- Right header -->
  <rect x="712" y="74" width="80" height="24" rx="4" fill="rgba(201,168,76,0.15)"/>
  <text x="752" y="91" text-anchor="middle" fill="#C9A84C" font-size="11.5" font-weight="600" letter-spacing="1"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">AI 时代</text>

  <text x="932" y="103" text-anchor="middle" fill="#ECE6D8" font-size="17" font-weight="600"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">按认知沟通成本拆分</text>

  <line x1="712" y1="116" x2="1152" y2="116" stroke="rgba(201,168,76,0.15)" stroke-width="1"/>

  <!-- Right items -->
  <text x="732" y="148" fill="#8C7E6A" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">拆分标准</text>
  <text x="848" y="148" fill="#EDD07C" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">业务理解需要多少人协同?</text>

  <line x1="712" y1="162" x2="1152" y2="162" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <text x="732" y="191" fill="#8C7E6A" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">核心假设</text>
  <text x="848" y="191" fill="#ECE6D8" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">执行成本低，理解成本成为瓶颈</text>

  <line x1="712" y1="205" x2="1152" y2="205" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <text x="732" y="234" fill="#8C7E6A" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">协作方式</text>
  <text x="848" y="234" fill="#ECE6D8" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">频繁业务沟通 → 一人负责</text>

  <line x1="712" y1="248" x2="1152" y2="248" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <text x="732" y="277" fill="#8C7E6A" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">主要成本</text>
  <text x="848" y="277" fill="#3FA86C" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">个人对全局的理解深度</text>

  <line x1="712" y1="291" x2="1152" y2="291" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <text x="732" y="318" fill="#8C7E6A" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">适合场景</text>
  <text x="848" y="318" fill="#ECE6D8" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">跨模块业务、复杂体验流程设计</text>
</svg>
