<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="gold-arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#C9A84C"/>
    </marker>
    <!-- clip for unified circle quadrants -->
    <clipPath id="quad-tl"><rect x="480" y="80" width="110" height="110"/></clipPath>
    <clipPath id="quad-tr"><rect x="590" y="80" width="110" height="110"/></clipPath>
    <clipPath id="quad-bl"><rect x="480" y="190" width="110" height="110"/></clipPath>
    <clipPath id="quad-br"><rect x="590" y="190" width="110" height="110"/></clipPath>
  </defs>

  <rect width="1200" height="360" fill="#0C0A14"/>

  <!-- eyebrow -->
  <rect width="1200" height="44" fill="rgba(201,168,76,0.04)"/>
  <text x="600" y="27" text-anchor="middle" fill="#C9A84C" font-size="11.5" letter-spacing="4" font-weight="500"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">
    任务拆分的标准正在发生迁移
  </text>

  <!-- ====== LEFT: FRAGMENTED (before) ====== -->
  <text x="220" y="70" text-anchor="middle" fill="#9B7EDF" font-size="12" letter-spacing="2"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">过 去</text>

  <!-- 4 separate boxes in 2×2 with gaps -->
  <!-- TL box -->
  <rect x="68" y="88" width="136" height="96" rx="8" fill="rgba(155,126,223,0.06)" stroke="rgba(155,126,223,0.3)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="136" y="132" text-anchor="middle" fill="#9B7EDF" font-size="11"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">文件同步</text>
  <text x="136" y="152" text-anchor="middle" fill="#8C7E6A" font-size="10"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">模块 01</text>

  <!-- TR box -->
  <rect x="236" y="88" width="136" height="96" rx="8" fill="rgba(155,126,223,0.06)" stroke="rgba(155,126,223,0.3)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="304" y="132" text-anchor="middle" fill="#9B7EDF" font-size="11"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">版本管理</text>
  <text x="304" y="152" text-anchor="middle" fill="#8C7E6A" font-size="10"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">模块 02</text>

  <!-- BL box -->
  <rect x="68" y="214" width="136" height="96" rx="8" fill="rgba(155,126,223,0.06)" stroke="rgba(155,126,223,0.3)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="136" y="258" text-anchor="middle" fill="#9B7EDF" font-size="11"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">恢复策略</text>
  <text x="136" y="278" text-anchor="middle" fill="#8C7E6A" font-size="10"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">模块 03</text>

  <!-- BR box -->
  <rect x="236" y="214" width="136" height="96" rx="8" fill="rgba(155,126,223,0.06)" stroke="rgba(155,126,223,0.3)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="304" y="258" text-anchor="middle" fill="#9B7EDF" font-size="11"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">任务调度</text>
  <text x="304" y="278" text-anchor="middle" fill="#8C7E6A" font-size="10"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">模块 04</text>

  <!-- inter-module dashed arrows (communication overhead) -->
  <line x1="204" y1="136" x2="236" y2="136" stroke="rgba(212,128,58,0.6)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#gold-arr)"/>
  <line x1="236" y1="145" x2="204" y2="145" stroke="rgba(212,128,58,0.4)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#gold-arr)"/>
  <line x1="136" y1="184" x2="136" y2="214" stroke="rgba(212,128,58,0.6)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#gold-arr)"/>
  <line x1="145" y1="214" x2="145" y2="184" stroke="rgba(212,128,58,0.4)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#gold-arr)"/>
  <line x1="204" y1="262" x2="236" y2="262" stroke="rgba(212,128,58,0.6)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#gold-arr)"/>
  <line x1="236" y1="271" x2="204" y2="271" stroke="rgba(212,128,58,0.4)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#gold-arr)"/>
  <line x1="304" y1="184" x2="304" y2="214" stroke="rgba(212,128,58,0.6)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#gold-arr)"/>
  <line x1="313" y1="214" x2="313" y2="184" stroke="rgba(212,128,58,0.4)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#gold-arr)"/>

  <!-- cost label -->
  <text x="220" y="316" text-anchor="middle" fill="rgba(212,128,58,0.7)" font-size="12"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">高对齐成本</text>
  <text x="220" y="336" text-anchor="middle" fill="#4A3F30" font-size="11"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">按功能边界</text>

  <!-- ====== CENTER ARROW ====== -->
  <line x1="420" y1="198" x2="462" y2="198" stroke="#C9A84C" stroke-width="2.5" marker-end="url(#gold-arr)"/>
  <text x="441" y="220" text-anchor="middle" fill="rgba(201,168,76,0.65)" font-size="10.5"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">AI 改变了前提</text>

  <!-- ====== RIGHT: UNIFIED (after) ====== -->
  <text x="755" y="70" text-anchor="middle" fill="#C9A84C" font-size="12" letter-spacing="2"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">AI 时代</text>

  <!-- Unified circle with 4 quadrant fills -->
  <!-- The circle is centered at (755, 198), r=110 -->
  <!-- 4 quadrant arcs as sectors -->
  <!-- TL sector (top-left): green -->
  <path d="M 755,198 L 755,88 A 110,110 0 0,0 645,198 Z"
        fill="rgba(63,168,108,0.12)" stroke="none"/>
  <!-- TR sector (top-right): gold -->
  <path d="M 755,198 L 865,198 A 110,110 0 0,0 755,88 Z"
        fill="rgba(201,168,76,0.1)" stroke="none"/>
  <!-- BL sector (bottom-left): purple -->
  <path d="M 755,198 L 645,198 A 110,110 0 0,0 755,308 Z"
        fill="rgba(155,126,223,0.1)" stroke="none"/>
  <!-- BR sector (bottom-right): blue -->
  <path d="M 755,198 L 755,308 A 110,110 0 0,0 865,198 Z"
        fill="rgba(63,168,212,0.08)" stroke="none"/>

  <!-- outer circle border -->
  <circle cx="755" cy="198" r="110" fill="none" stroke="rgba(63,168,108,0.45)" stroke-width="2"/>

  <!-- internal dividers (cross) -->
  <line x1="755" y1="88" x2="755" y2="308" stroke="rgba(63,168,108,0.2)" stroke-width="1"/>
  <line x1="645" y1="198" x2="865" y2="198" stroke="rgba(63,168,108,0.2)" stroke-width="1"/>

  <!-- quadrant labels inside circle -->
  <text x="700" y="154" text-anchor="middle" fill="rgba(63,168,108,0.85)" font-size="11"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">文件同步</text>
  <text x="810" y="154" text-anchor="middle" fill="rgba(201,168,76,0.85)" font-size="11"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">版本管理</text>
  <text x="700" y="248" text-anchor="middle" fill="rgba(155,126,223,0.85)" font-size="11"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">恢复策略</text>
  <text x="810" y="248" text-anchor="middle" fill="rgba(63,168,212,0.85)" font-size="11"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">任务调度</text>

  <!-- center dot -->
  <circle cx="755" cy="198" r="6" fill="#3FA86C" opacity="0.8"/>

  <!-- benefit label -->
  <text x="755" y="340" text-anchor="middle" fill="#3FA86C" font-size="12"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">低认知摩擦</text>
  <text x="755" y="358" text-anchor="middle" fill="#4A3F30" font-size="11"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">按认知沟通成本</text>

  <!-- ====== RIGHT SIDE COMPARISON ====== -->
  <!-- person+AI integrated visual on far right -->
  <text x="1060" y="70" text-anchor="middle" fill="#8C7E6A" font-size="11" letter-spacing="1"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">认知统一</text>

  <!-- Single person with circle encompassing all -->
  <circle cx="960" cy="175" r="26" fill="rgba(63,168,108,0.2)" stroke="rgba(63,168,108,0.55)" stroke-width="2"/>
  <rect x="946" y="205" width="28" height="44" rx="9" fill="rgba(63,168,108,0.2)" stroke="rgba(63,168,108,0.45)" stroke-width="1.5"/>

  <!-- Knowledge rays emanating from person -->
  <line x1="986" y1="160" x2="1040" y2="130" stroke="rgba(201,168,76,0.4)" stroke-width="1.5"/>
  <line x1="990" y1="175" x2="1060" y2="175" stroke="rgba(201,168,76,0.4)" stroke-width="1.5"/>
  <line x1="986" y1="190" x2="1040" y2="218" stroke="rgba(201,168,76,0.4)" stroke-width="1.5"/>

  <!-- small dots at ray ends -->
  <circle cx="1043" cy="128" r="4" fill="rgba(201,168,76,0.55)"/>
  <circle cx="1063" cy="175" r="4" fill="rgba(201,168,76,0.55)"/>
  <circle cx="1043" cy="220" r="4" fill="rgba(201,168,76,0.55)"/>

  <text x="960" y="276" text-anchor="middle" fill="#8C7E6A" font-size="11"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">业务理解全局统一</text>
  <text x="960" y="296" text-anchor="middle" fill="#4A3F30" font-size="10"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">一人端到端负责</text>
</svg>
