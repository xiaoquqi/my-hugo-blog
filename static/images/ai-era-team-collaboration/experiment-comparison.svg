<svg width="1200" height="440" viewBox="0 0 1200 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr-g" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#3FA86C"/>
    </marker>
    <marker id="arr-gold" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#C9A84C"/>
    </marker>
  </defs>

  <rect width="1200" height="440" fill="#0C0A14"/>

  <!-- top strip -->
  <rect width="1200" height="44" fill="rgba(201,168,76,0.04)"/>
  <text x="600" y="27" text-anchor="middle" fill="#C9A84C" font-size="11" letter-spacing="5" font-weight="500"
        font-family="Arial,Helvetica,sans-serif">TEAM  VS  SOLO × AI</text>

  <!-- ======================================================
       LEFT PANEL – chaos: 4 people all talking at each other
       ====================================================== -->
  <rect x="28" y="54" width="528" height="362" rx="14" fill="rgba(217,79,79,0.05)" stroke="rgba(217,79,79,0.2)" stroke-width="1.5"/>

  <!-- speech bubbles FIRST (behind heads) -->
  <!-- bubble from TL → center -->
  <rect x="190" y="148" width="72" height="36" rx="8" fill="#1C1626" stroke="rgba(217,79,79,0.6)" stroke-width="2"/>
  <polygon points="190,166 172,170 192,172" fill="#1C1626" stroke="rgba(217,79,79,0.6)" stroke-width="2"/>
  <text x="226" y="171" text-anchor="middle" fill="#D94F4F" font-size="18" font-weight="700" font-family="Arial">??</text>

  <!-- bubble from TR → center -->
  <rect x="338" y="142" width="72" height="36" rx="8" fill="#1C1626" stroke="rgba(217,79,79,0.6)" stroke-width="2"/>
  <polygon points="410,160 428,164 408,166" fill="#1C1626" stroke="rgba(217,79,79,0.6)" stroke-width="2"/>
  <text x="374" y="165" text-anchor="middle" fill="#D94F4F" font-size="18" font-weight="700" font-family="Arial">??</text>

  <!-- bubble from BL → center -->
  <rect x="186" y="258" width="72" height="36" rx="8" fill="#1C1626" stroke="rgba(217,79,79,0.6)" stroke-width="2"/>
  <polygon points="188,274 168,282 190,278" fill="#1C1626" stroke="rgba(217,79,79,0.6)" stroke-width="2"/>
  <text x="222" y="281" text-anchor="middle" fill="#D94F4F" font-size="18" font-weight="700" font-family="Arial">!?</text>

  <!-- bubble from BR → center -->
  <rect x="338" y="254" width="72" height="36" rx="8" fill="#1C1626" stroke="rgba(217,79,79,0.6)" stroke-width="2"/>
  <polygon points="410,270 430,278 408,274" fill="#1C1626" stroke="rgba(217,79,79,0.6)" stroke-width="2"/>
  <text x="374" y="277" text-anchor="middle" fill="#D94F4F" font-size="18" font-weight="700" font-family="Arial">!?</text>

  <!-- ── Person TL (confused) ── cx=152, cy=168 -->
  <g transform="translate(152,168)">
    <circle r="34" fill="#1E1530" stroke="#9B7EDF" stroke-width="3.5"/>
    <circle cx="-11" cy="-7" r="5" fill="#ECE6D8"/>
    <circle cx="11" cy="-7" r="5" fill="#ECE6D8"/>
    <!-- wavy frown -->
    <path d="M -12,14 Q -4,8 4,13 Q 12,18 13,12" fill="none" stroke="#ECE6D8" stroke-width="2.5" stroke-linecap="round"/>
    <!-- worried brows -->
    <path d="M -17,-18 L -6,-13" stroke="#ECE6D8" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 6,-13 L 17,-18" stroke="#ECE6D8" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- ── Person TR (confused) ── cx=430, cy=160 -->
  <g transform="translate(430,160)">
    <circle r="34" fill="#1E1530" stroke="#9B7EDF" stroke-width="3.5"/>
    <circle cx="-11" cy="-7" r="5" fill="#ECE6D8"/>
    <circle cx="11" cy="-7" r="5" fill="#ECE6D8"/>
    <path d="M -12,14 Q -4,8 4,13 Q 12,18 13,12" fill="none" stroke="#ECE6D8" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M -17,-18 L -6,-13" stroke="#ECE6D8" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 6,-13 L 17,-18" stroke="#ECE6D8" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- ── Person BL (confused) ── cx=148, cy=296 -->
  <g transform="translate(148,296)">
    <circle r="34" fill="#1E1530" stroke="#9B7EDF" stroke-width="3.5"/>
    <circle cx="-11" cy="-7" r="5" fill="#ECE6D8"/>
    <circle cx="11" cy="-7" r="5" fill="#ECE6D8"/>
    <path d="M -12,14 Q -4,8 4,13 Q 12,18 13,12" fill="none" stroke="#ECE6D8" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M -17,-18 L -6,-13" stroke="#ECE6D8" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 6,-13 L 17,-18" stroke="#ECE6D8" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- ── Person BR (confused) ── cx=428, cy=290 -->
  <g transform="translate(428,290)">
    <circle r="34" fill="#1E1530" stroke="#9B7EDF" stroke-width="3.5"/>
    <circle cx="-11" cy="-7" r="5" fill="#ECE6D8"/>
    <circle cx="11" cy="-7" r="5" fill="#ECE6D8"/>
    <path d="M -12,14 Q -4,8 4,13 Q 12,18 13,12" fill="none" stroke="#ECE6D8" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M -17,-18 L -6,-13" stroke="#ECE6D8" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 6,-13 L 17,-18" stroke="#ECE6D8" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- large ✗ -->
  <line x1="255" y1="368" x2="305" y2="418" stroke="#D94F4F" stroke-width="8" stroke-linecap="round"/>
  <line x1="305" y1="368" x2="255" y2="418" stroke="#D94F4F" stroke-width="8" stroke-linecap="round"/>

  <!-- VS -->
  <text x="600" y="248" text-anchor="middle" fill="rgba(201,168,76,0.55)" font-size="30" font-weight="900"
        font-family="Arial,Helvetica,sans-serif">VS</text>

  <!-- ======================================================
       RIGHT PANEL – flow: 1 person + robot → goal
       ====================================================== -->
  <rect x="644" y="54" width="528" height="362" rx="14" fill="rgba(63,168,108,0.05)" stroke="rgba(63,168,108,0.25)" stroke-width="1.5"/>

  <!-- ── Human (happy) ── cx=740, cy=210 -->
  <g transform="translate(740,210)">
    <circle r="38" fill="#101E14" stroke="#3FA86C" stroke-width="4"/>
    <circle cx="-13" cy="-9" r="6" fill="#ECE6D8"/>
    <circle cx="13" cy="-9" r="6" fill="#ECE6D8"/>
    <!-- big smile -->
    <path d="M -14,10 Q 0,28 14,10" fill="none" stroke="#ECE6D8" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- body -->
  <rect x="722" y="252" width="36" height="52" rx="12" fill="#101E14" stroke="#3FA86C" stroke-width="3"/>

  <!-- ── Robot ── cx=890, cy=210 -->
  <g transform="translate(890,210)">
    <!-- head box -->
    <rect x="-36" y="-42" width="72" height="80" rx="12" fill="#101A1E" stroke="#C9A84C" stroke-width="4"/>
    <!-- antenna -->
    <line x1="0" y1="-42" x2="0" y2="-62" stroke="#C9A84C" stroke-width="3"/>
    <circle cx="0" cy="-66" r="7" fill="#C9A84C"/>
    <!-- eyes (square) -->
    <rect x="-24" y="-26" width="18" height="18" rx="4" fill="#C9A84C" opacity="0.85"/>
    <rect x="6"  y="-26" width="18" height="18" rx="4" fill="#C9A84C" opacity="0.85"/>
    <!-- mouth bars -->
    <rect x="-22" y="6"  width="44" height="5" rx="2.5" fill="#C9A84C" opacity="0.7"/>
    <rect x="-16" y="16" width="32" height="5" rx="2.5" fill="#C9A84C" opacity="0.45"/>
  </g>
  <!-- robot body -->
  <rect x="872" y="252" width="36" height="52" rx="10" fill="#101A1E" stroke="#C9A84C" stroke-width="3"/>

  <!-- shared speech bubble → goal -->
  <rect x="792" y="128" width="140" height="48" rx="12" fill="#101E14" stroke="#3FA86C" stroke-width="2.5"/>
  <polygon points="830,176 820,196 845,176" fill="#101E14" stroke="#3FA86C" stroke-width="2.5"/>
  <text x="862" y="158" text-anchor="middle" fill="#3FA86C" font-size="22" font-weight="700" font-family="Arial">→ ★</text>

  <!-- arrow to goal -->
  <line x1="940" y1="210" x2="1040" y2="210" stroke="#3FA86C" stroke-width="3" marker-end="url(#arr-g)"/>

  <!-- star goal -->
  <polygon points="1090,178 1100,205 1130,205 1106,221 1116,248 1090,232 1064,248 1074,221 1050,205 1080,205"
           fill="rgba(201,168,76,0.75)" stroke="#EDD07C" stroke-width="2"/>

  <!-- large ✓ -->
  <polyline points="835,375 865,408 935,355" fill="none" stroke="#3FA86C" stroke-width="8"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
