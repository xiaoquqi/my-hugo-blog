<svg width="1200" height="440" viewBox="0 0 1200 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#3FA86C"/>
    </marker>
  </defs>

  <rect width="1200" height="440" fill="#0C0A14"/>

  <!-- eyebrow -->
  <rect width="1200" height="44" fill="rgba(201,168,76,0.04)"/>
  <text x="600" y="27" text-anchor="middle" fill="#C9A84C" font-size="11.5" letter-spacing="4" font-weight="500"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">
    同一产品 · 两种研发组织方式 · 内部对比实验
  </text>

  <!-- ====== LEFT PANEL ====== -->
  <rect x="28" y="54" width="522" height="362" rx="10" fill="#0F0D18" stroke="rgba(155,126,223,0.18)" stroke-width="1"/>

  <!-- panel label -->
  <text x="289" y="84" text-anchor="middle" fill="#9B7EDF" font-size="12" letter-spacing="2" font-weight="500"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">传统团队协作</text>

  <!-- ── 4 person icons ── -->
  <!-- Person TL: head cx=168, cy=152 -->
  <circle cx="168" cy="150" r="18" fill="rgba(155,126,223,0.25)" stroke="rgba(155,126,223,0.5)" stroke-width="1.5"/>
  <rect x="156" y="172" width="24" height="38" rx="8" fill="rgba(155,126,223,0.25)" stroke="rgba(155,126,223,0.4)" stroke-width="1"/>

  <!-- Person TR: cx=386, cy=148 -->
  <circle cx="386" cy="148" r="18" fill="rgba(155,126,223,0.25)" stroke="rgba(155,126,223,0.5)" stroke-width="1.5"/>
  <rect x="374" y="170" width="24" height="38" rx="8" fill="rgba(155,126,223,0.25)" stroke="rgba(155,126,223,0.4)" stroke-width="1"/>

  <!-- Person BL: cx=162, cy=290 -->
  <circle cx="162" cy="288" r="18" fill="rgba(155,126,223,0.25)" stroke="rgba(155,126,223,0.5)" stroke-width="1.5"/>
  <rect x="150" y="310" width="24" height="38" rx="8" fill="rgba(155,126,223,0.25)" stroke="rgba(155,126,223,0.4)" stroke-width="1"/>

  <!-- Person BR: cx=380, cy=285 -->
  <circle cx="380" cy="284" r="18" fill="rgba(155,126,223,0.25)" stroke="rgba(155,126,223,0.5)" stroke-width="1.5"/>
  <rect x="368" y="306" width="24" height="38" rx="8" fill="rgba(155,126,223,0.25)" stroke="rgba(155,126,223,0.4)" stroke-width="1"/>

  <!-- ── Communication web (6 lines, drawn under icons) ── -->
  <line x1="186" y1="168" x2="368" y2="166" stroke="rgba(212,128,58,0.55)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="173" y1="188" x2="162" y2="270" stroke="rgba(212,128,58,0.45)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="186" y1="190" x2="362" y2="288" stroke="rgba(212,128,58,0.35)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="368" y1="168" x2="178" y2="282" stroke="rgba(212,128,58,0.35)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="386" y1="186" x2="380" y2="266" stroke="rgba(212,128,58,0.5)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="180" y1="312" x2="362" y2="302" stroke="rgba(212,128,58,0.45)" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- communication cost label (center of web) -->
  <text x="277" y="237" text-anchor="middle" fill="rgba(212,128,58,0.7)" font-size="11"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">⟷ 跨模块对齐沟通</text>

  <!-- ── Result ── -->
  <!-- large X mark -->
  <line x1="234" y1="372" x2="266" y2="404" stroke="#D94F4F" stroke-width="5" stroke-linecap="round"/>
  <line x1="266" y1="372" x2="234" y2="404" stroke="#D94F4F" stroke-width="5" stroke-linecap="round"/>
  <text x="295" y="394" fill="#D94F4F" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">体验割裂 · 一致性弱</text>

  <!-- ====== VS ====== -->
  <text x="600" y="250" text-anchor="middle" fill="rgba(201,168,76,0.4)" font-size="28" font-weight="700"
        font-family="Arial,Helvetica,sans-serif">VS</text>

  <!-- ====== RIGHT PANEL ====== -->
  <rect x="650" y="54" width="522" height="362" rx="10" fill="#0F0D18" stroke="rgba(63,168,108,0.25)" stroke-width="1"/>

  <!-- panel label -->
  <text x="911" y="84" text-anchor="middle" fill="#3FA86C" font-size="12" letter-spacing="2" font-weight="500"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">一人 × AI</text>

  <!-- ── Single person icon (larger) ── -->
  <circle cx="762" cy="195" r="26" fill="rgba(63,168,108,0.2)" stroke="rgba(63,168,108,0.55)" stroke-width="2"/>
  <rect x="748" y="225" width="28" height="52" rx="10" fill="rgba(63,168,108,0.2)" stroke="rgba(63,168,108,0.45)" stroke-width="1.5"/>

  <!-- ── AI hexagon badge ── -->
  <polygon points="900,168 924,180 924,205 900,217 876,205 876,180"
           fill="rgba(201,168,76,0.1)" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>
  <text x="900" y="198" text-anchor="middle" fill="#EDD07C" font-size="14" font-weight="700"
        font-family="Arial,Helvetica,sans-serif">AI</text>

  <!-- ── Product/delivery icon (diamond) ── -->
  <polygon points="1060,175 1090,200 1060,225 1030,200"
           fill="rgba(63,168,108,0.12)" stroke="rgba(63,168,108,0.5)" stroke-width="1.5"/>
  <text x="1060" y="205" text-anchor="middle" fill="#3FA86C" font-size="11"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">交付</text>

  <!-- ── Flow arrows (person → AI → product) ── -->
  <line x1="792" y1="222" x2="874" y2="205" stroke="#3FA86C" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="926" y1="195" x2="1028" y2="198" stroke="#3FA86C" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- ── Result ── -->
  <!-- large checkmark -->
  <polyline points="222,388 250,413 310,365" fill="none" stroke="#3FA86C" stroke-width="5"
            stroke-linecap="round" stroke-linejoin="round"
            transform="translate(640,0)"/>
  <text x="970" y="394" fill="#3FA86C" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">体验一致 · 逻辑连贯</text>

  <!-- bottom labels -->
  <text x="762" y="310" text-anchor="middle" fill="#8C7E6A" font-size="12"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">全程统一理解</text>
  <text x="900" y="310" text-anchor="middle" fill="#8C7E6A" font-size="12"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">结果导向</text>
  <text x="1060" y="310" text-anchor="middle" fill="#8C7E6A" font-size="12"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">完整交付</text>
</svg>
