<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="g-arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#3FA86C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#0C0A14"/>

  <!-- Top eyebrow -->
  <rect width="1200" height="44" fill="rgba(201,168,76,0.04)"/>
  <text x="600" y="27" text-anchor="middle" fill="#C9A84C"
        font-size="11.5" letter-spacing="4" font-weight="500"
        font-family="'PingFang SC','Microsoft YaHei','Hiragino Sans GB',system-ui,sans-serif">
    同一产品 · 两种研发组织方式 · 内部对比实验
  </text>

  <!-- ===== LEFT PANEL: Team ===== -->
  <rect x="28" y="54" width="522" height="344" rx="10" fill="#0F0D18" stroke="rgba(155,126,223,0.2)" stroke-width="1"/>
  <rect x="28" y="54" width="522" height="64" rx="10" fill="rgba(155,126,223,0.06)"/>
  <rect x="28" y="96"  width="522" height="22" fill="#0F0D18"/>

  <text x="289" y="87" text-anchor="middle" fill="#ECE6D8" font-size="17" font-weight="600"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">传统团队协作</text>
  <text x="289" y="112" text-anchor="middle" fill="#8C7E6A" font-size="12"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">2名前端 + 2名后端 + Lead（兼任产品经理）</text>

  <line x1="68" y1="126" x2="510" y2="126" stroke="rgba(155,126,223,0.12)" stroke-width="1"/>

  <!-- Module boxes 2×2 -->
  <rect x="68"  y="140" width="185" height="66" rx="7" fill="rgba(155,126,223,0.05)" stroke="rgba(155,126,223,0.22)" stroke-width="1"/>
  <text x="160" y="165" text-anchor="middle" fill="#9B7EDF" font-size="10"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">模块 01</text>
  <text x="160" y="190" text-anchor="middle" fill="#ECE6D8" font-size="14" font-weight="600"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">文件同步</text>

  <rect x="275" y="140" width="185" height="66" rx="7" fill="rgba(155,126,223,0.05)" stroke="rgba(155,126,223,0.22)" stroke-width="1"/>
  <text x="367" y="165" text-anchor="middle" fill="#9B7EDF" font-size="10"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">模块 02</text>
  <text x="367" y="190" text-anchor="middle" fill="#ECE6D8" font-size="14" font-weight="600"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">版本管理</text>

  <rect x="68"  y="232" width="185" height="66" rx="7" fill="rgba(155,126,223,0.05)" stroke="rgba(155,126,223,0.22)" stroke-width="1"/>
  <text x="160" y="257" text-anchor="middle" fill="#9B7EDF" font-size="10"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">模块 03</text>
  <text x="160" y="282" text-anchor="middle" fill="#ECE6D8" font-size="14" font-weight="600"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">恢复策略</text>

  <rect x="275" y="232" width="185" height="66" rx="7" fill="rgba(155,126,223,0.05)" stroke="rgba(155,126,223,0.22)" stroke-width="1"/>
  <text x="367" y="257" text-anchor="middle" fill="#9B7EDF" font-size="10"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">模块 04</text>
  <text x="367" y="282" text-anchor="middle" fill="#ECE6D8" font-size="14" font-weight="600"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">任务调度</text>

  <!-- Coupling cost dashes -->
  <line x1="253" y1="173" x2="275" y2="173" stroke="#D4803A" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="253" y1="265" x2="275" y2="265" stroke="#D4803A" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="160" y1="206" x2="160" y2="232" stroke="#D4803A" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="367" y1="206" x2="367" y2="232" stroke="#D4803A" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="289" y="222" text-anchor="middle" fill="rgba(212,128,58,0.7)" font-size="10.5"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">⟷ 跨模块对齐沟通</text>

  <!-- Left result -->
  <rect x="68" y="316" width="394" height="62" rx="7" fill="rgba(217,79,79,0.07)" stroke="rgba(217,79,79,0.2)" stroke-width="1"/>
  <text x="265" y="342" text-anchor="middle" fill="#D94F4F" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">一致性弱 · 恢复流程割裂 · 联调成本高</text>
  <text x="265" y="363" text-anchor="middle" fill="rgba(217,79,79,0.6)" font-size="11.5"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">产品逻辑碎片化，整体体验不及预期</text>

  <!-- ===== VS ===== -->
  <text x="600" y="263" text-anchor="middle" fill="rgba(201,168,76,0.4)" font-size="26" font-weight="700"
        font-family="Arial,Helvetica,sans-serif">VS</text>

  <!-- ===== RIGHT PANEL: Individual + AI ===== -->
  <rect x="650" y="54" width="522" height="344" rx="10" fill="#0F0D18" stroke="rgba(63,168,108,0.28)" stroke-width="1"/>
  <rect x="650" y="54" width="522" height="64" rx="10" fill="rgba(63,168,108,0.06)"/>
  <rect x="650" y="96"  width="522" height="22" fill="#0F0D18"/>

  <text x="911" y="87" text-anchor="middle" fill="#ECE6D8" font-size="17" font-weight="600"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">一人 × AI</text>
  <text x="911" y="112" text-anchor="middle" fill="#8C7E6A" font-size="12"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">客户交付背景 · 需求到交付 · 全程端到端独立负责</text>

  <line x1="690" y1="126" x2="1132" y2="126" stroke="rgba(63,168,108,0.12)" stroke-width="1"/>

  <!-- Flow steps 2×2 (clockwise flow) -->
  <!-- TL: 需求分析 -->
  <rect x="696"  y="140" width="185" height="66" rx="7" fill="rgba(63,168,108,0.07)" stroke="rgba(63,168,108,0.28)" stroke-width="1"/>
  <text x="788" y="170" text-anchor="middle" fill="#ECE6D8" font-size="14" font-weight="600"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">需求分析</text>
  <text x="788" y="193" text-anchor="middle" fill="#3FA86C" font-size="11"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">统一理解目标</text>

  <!-- TR: 方案设计 -->
  <rect x="905" y="140" width="185" height="66" rx="7" fill="rgba(63,168,108,0.07)" stroke="rgba(63,168,108,0.28)" stroke-width="1"/>
  <text x="997" y="170" text-anchor="middle" fill="#ECE6D8" font-size="14" font-weight="600"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">方案设计</text>
  <text x="997" y="193" text-anchor="middle" fill="#3FA86C" font-size="11"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">一以贯之</text>

  <!-- BL: 完整交付 -->
  <rect x="696"  y="232" width="185" height="66" rx="7" fill="rgba(63,168,108,0.07)" stroke="rgba(63,168,108,0.28)" stroke-width="1"/>
  <text x="788" y="262" text-anchor="middle" fill="#ECE6D8" font-size="14" font-weight="600"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">完整交付</text>
  <text x="788" y="285" text-anchor="middle" fill="#3FA86C" font-size="11"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">结果导向</text>

  <!-- BR: 开发实现 -->
  <rect x="905" y="232" width="185" height="66" rx="7" fill="rgba(63,168,108,0.07)" stroke="rgba(63,168,108,0.28)" stroke-width="1"/>
  <text x="997" y="262" text-anchor="middle" fill="#ECE6D8" font-size="14" font-weight="600"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">开发实现</text>
  <text x="997" y="285" text-anchor="middle" fill="#3FA86C" font-size="11"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">AI 主力执行</text>

  <!-- Clockwise arrows -->
  <line x1="881" y1="173" x2="905" y2="173" stroke="#3FA86C" stroke-width="1.5" marker-end="url(#g-arr)"/>
  <line x1="997" y1="206" x2="997" y2="232" stroke="#3FA86C" stroke-width="1.5" marker-end="url(#g-arr)"/>
  <line x1="905" y1="265" x2="881" y2="265" stroke="#3FA86C" stroke-width="1.5" marker-end="url(#g-arr)"/>
  <line x1="788" y1="232" x2="788" y2="206" stroke="#3FA86C" stroke-width="1.5" marker-end="url(#g-arr)"/>

  <!-- Center AI badge -->
  <rect x="866" y="220" width="78" height="28" rx="5" fill="rgba(201,168,76,0.1)" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
  <text x="905" y="238" text-anchor="middle" fill="#C9A84C" font-size="12" font-weight="600"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">AI 驱动</text>

  <!-- Right result -->
  <rect x="690" y="316" width="440" height="62" rx="7" fill="rgba(63,168,108,0.07)" stroke="rgba(63,168,108,0.22)" stroke-width="1"/>
  <text x="910" y="342" text-anchor="middle" fill="#3FA86C" font-size="13"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">交付更快 · 一致性强 · 体验更优</text>
  <text x="910" y="363" text-anchor="middle" fill="rgba(63,168,108,0.65)" font-size="11.5"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">统一的业务理解，产品逻辑高度连贯</text>
</svg>
