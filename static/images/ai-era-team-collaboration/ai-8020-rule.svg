<svg width="1200" height="380" viewBox="0 0 1200 380" xmlns="http://www.w3.org/2000/svg">

  <rect width="1200" height="380" fill="#0C0A14"/>

  <!-- top strip -->
  <rect width="1200" height="44" fill="rgba(201,168,76,0.04)"/>
  <text x="600" y="27" text-anchor="middle" fill="#C9A84C" font-size="11" letter-spacing="5" font-weight="500"
        font-family="Arial,Helvetica,sans-serif">EXECUTION  vs  JUDGMENT</text>

  <!-- ======================================================
       LEFT ZONE (80%) – ROCKET: speed, execution, AI power
       ====================================================== -->
  <rect x="28" y="54" width="740" height="306" rx="14" fill="rgba(63,168,108,0.05)" stroke="rgba(63,168,108,0.2)" stroke-width="1.5"/>

  <!-- "80%" ghost watermark -->
  <text x="600" y="290" text-anchor="middle" fill="rgba(63,168,108,0.1)" font-size="130" font-weight="900"
        font-family="Arial,Helvetica,sans-serif">80%</text>

  <!-- ── ROCKET (pointing right) ── centered ~(300, 207) -->
  <!-- Flame (behind rocket) -->
  <path d="M 178,185 Q 116,207 178,229 Q 148,207 178,185 Z" fill="rgba(212,128,58,0.85)"/>
  <path d="M 178,194 Q 134,207 178,220 Q 152,207 178,194 Z" fill="rgba(237,208,124,0.7)"/>

  <!-- Rocket body -->
  <ellipse cx="290" cy="207" rx="115" ry="36" fill="#0F1E14" stroke="#3FA86C" stroke-width="4"/>

  <!-- Nose cone -->
  <polygon points="405,171 480,207 405,243" fill="#0F1E14" stroke="#3FA86C" stroke-width="4"/>

  <!-- Fins (top + bottom) -->
  <polygon points="178,171 210,171 210,200" fill="#2A6644" stroke="#3FA86C" stroke-width="2.5"/>
  <polygon points="178,243 210,243 210,214" fill="#2A6644" stroke="#3FA86C" stroke-width="2.5"/>

  <!-- Porthole -->
  <circle cx="316" cy="207" r="24" fill="rgba(201,168,76,0.12)" stroke="#C9A84C" stroke-width="3"/>
  <circle cx="308" cy="199" r="8" fill="rgba(201,168,76,0.35)"/>

  <!-- "AI" label on rocket -->
  <text x="265" y="213" text-anchor="middle" fill="#3FA86C" font-size="16" font-weight="700"
        font-family="Arial,Helvetica,sans-serif">AI</text>

  <!-- Speed streaks after rocket -->
  <line x1="512" y1="188" x2="600" y2="188" stroke="rgba(63,168,108,0.55)" stroke-width="3" stroke-linecap="round"/>
  <line x1="512" y1="207" x2="628" y2="207" stroke="rgba(63,168,108,0.65)" stroke-width="4" stroke-linecap="round"/>
  <line x1="512" y1="226" x2="598" y2="226" stroke="rgba(63,168,108,0.55)" stroke-width="3" stroke-linecap="round"/>
  <line x1="522" y1="174" x2="580" y2="174" stroke="rgba(63,168,108,0.35)" stroke-width="2" stroke-linecap="round"/>
  <line x1="522" y1="240" x2="576" y2="240" stroke="rgba(63,168,108,0.35)" stroke-width="2" stroke-linecap="round"/>

  <!-- Floating checkmarks (tasks completed) -->
  <polyline points="652,183 667,202 700,164" fill="none" stroke="#3FA86C" stroke-width="4.5"
            stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="712,199 724,215 752,185" fill="none" stroke="#3FA86C" stroke-width="4"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- ======================================================
       DIVIDER
       ====================================================== -->
  <line x1="778" y1="60" x2="778" y2="352" stroke="rgba(201,168,76,0.4)" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="778,207 790,220 778,233 766,220" fill="rgba(201,168,76,0.7)"/>

  <!-- ======================================================
       RIGHT ZONE (20%) – THINKING PERSON + LIGHTBULB
       ====================================================== -->
  <rect x="794" y="54" width="378" height="306" rx="14" fill="rgba(201,168,76,0.05)" stroke="rgba(201,168,76,0.25)" stroke-width="1.5"/>

  <!-- "20%" ghost watermark -->
  <text x="983" y="340" text-anchor="middle" fill="rgba(201,168,76,0.1)" font-size="100" font-weight="900"
        font-family="Arial,Helvetica,sans-serif">20%</text>

  <!-- ── THINKING PERSON ── head cx=920, cy=230 -->
  <!-- body first -->
  <rect x="905" y="272" width="30" height="56" rx="11" fill="#1A1A0F" stroke="#C9A84C" stroke-width="3.5"/>
  <!-- arm to chin (thinking pose) -->
  <path d="M 905,285 Q 876,274 878,254 Q 880,235 898,222"
        fill="none" stroke="#C9A84C" stroke-width="3.5" stroke-linecap="round"/>
  <!-- chin finger dot -->
  <circle cx="898" cy="222" r="5" fill="#C9A84C" opacity="0.7"/>

  <!-- head -->
  <circle cx="920" cy="218" r="42" fill="#1A1A0F" stroke="#C9A84C" stroke-width="4"/>
  <!-- thinking eyes (upward gaze) -->
  <ellipse cx="906" cy="210" rx="7" ry="6" fill="#ECE6D8"/>
  <ellipse cx="934" cy="210" rx="7" ry="6" fill="#ECE6D8"/>
  <!-- pupils looking up-right -->
  <circle cx="908" cy="208" r="3.5" fill="#1A1A0F"/>
  <circle cx="936" cy="208" r="3.5" fill="#1A1A0F"/>
  <!-- slight smile -->
  <path d="M 907,234 Q 920,246 933,234" fill="none" stroke="#ECE6D8" stroke-width="2.5" stroke-linecap="round"/>
  <!-- raised brow (thinking) -->
  <path d="M 899,196 Q 906,191 913,196" fill="none" stroke="#ECE6D8" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 927,196 Q 934,191 941,196" fill="none" stroke="#ECE6D8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ── THOUGHT BUBBLE chain ── -->
  <circle cx="950" cy="187" r="6" fill="rgba(201,168,76,0.45)"/>
  <circle cx="968" cy="168" r="9" fill="rgba(201,168,76,0.5)"/>
  <circle cx="990" cy="146" r="12" fill="rgba(201,168,76,0.55)"/>

  <!-- ── LIGHTBULB ── centered at cx=1042, cy=100 -->
  <!-- glass bulb -->
  <circle cx="1042" cy="100" r="38" fill="rgba(201,168,76,0.14)" stroke="#EDD07C" stroke-width="4"/>
  <!-- inner glow -->
  <circle cx="1042" cy="100" r="24" fill="rgba(237,208,124,0.4)"/>
  <!-- filament (simple zigzag) -->
  <path d="M 1026,108 L 1032,94 L 1038,106 L 1044,92 L 1050,104 L 1056,90 L 1058,108"
        fill="none" stroke="#EDD07C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- base -->
  <rect x="1028" y="138" width="28" height="8" rx="4" fill="#C9A84C"/>
  <rect x="1031" y="148" width="22" height="7" rx="3.5" fill="#C9A84C" opacity="0.75"/>
  <rect x="1034" y="157" width="16" height="6" rx="3" fill="#C9A84C" opacity="0.5"/>

  <!-- light rays -->
  <line x1="1042" y1="56" x2="1042" y2="46" stroke="#EDD07C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="1068" y1="64" x2="1075" y2="57" stroke="#EDD07C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="1080" y1="90"  x2="1092" y2="90"  stroke="#EDD07C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="1016" y1="64" x2="1009" y2="57" stroke="#EDD07C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="1004" y1="90"  x2="992" y2="90"  stroke="#EDD07C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="1072" y1="78" x2="1079" y2="71" stroke="#EDD07C" stroke-width="2" stroke-linecap="round"/>
  <line x1="1012" y1="78" x2="1005" y2="71" stroke="#EDD07C" stroke-width="2" stroke-linecap="round"/>
</svg>
