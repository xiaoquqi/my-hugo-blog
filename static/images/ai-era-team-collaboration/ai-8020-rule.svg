<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bar80" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3FA86C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3FA86C" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="bar20" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.28"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="#0C0A14"/>

  <!-- Top eyebrow -->
  <rect width="1200" height="44" fill="rgba(201,168,76,0.04)"/>
  <text x="600" y="27" text-anchor="middle" fill="#C9A84C" font-size="11.5" letter-spacing="4" font-weight="500"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">
    AI 并不让产品研发变简单，它只是让前 80% 变得更快
  </text>

  <!-- Main bar track -->
  <rect x="28" y="68" width="1144" height="110" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- 80% section -->
  <rect x="28" y="68" width="908" height="110" rx="8" fill="url(#bar80)" stroke="rgba(63,168,108,0.25)" stroke-width="1"/>

  <!-- 20% section (overlaps slightly for clean join) -->
  <rect x="920" y="68" width="252" height="110" rx="8" fill="url(#bar20)" stroke="rgba(201,168,76,0.35)" stroke-width="1"/>
  <!-- Cover left edge of 20% to make clean join -->
  <rect x="920" y="69" width="12" height="108" fill="url(#bar20)"/>

  <!-- Divider line -->
  <line x1="928" y1="56" x2="928" y2="192" stroke="rgba(201,168,76,0.5)" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- 80% label -->
  <text x="474" y="108" text-anchor="middle" fill="#3FA86C" font-size="40" font-weight="700"
        font-family="Arial,Helvetica,sans-serif">80%</text>
  <text x="474" y="133" text-anchor="middle" fill="#ECE6D8" font-size="14" font-weight="600"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">原型  /  流程  /  页面结构  /  接口雏形</text>
  <text x="474" y="157" text-anchor="middle" fill="rgba(63,168,108,0.8)" font-size="12"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">AI 已大幅加速 · 执行密度 · 靠"勤奋"</text>

  <!-- 20% label -->
  <text x="1046" y="108" text-anchor="middle" fill="#EDD07C" font-size="40" font-weight="700"
        font-family="Arial,Helvetica,sans-serif">20%</text>
  <text x="1046" y="133" text-anchor="middle" fill="#ECE6D8" font-size="14" font-weight="600"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">判断  /  取舍  /  审美</text>
  <text x="1046" y="157" text-anchor="middle" fill="rgba(201,168,76,0.8)" font-size="12"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">决定产品质量 · 靠"聪明"</text>

  <!-- AI加速 badge on 80% section -->
  <rect x="144" y="80" width="90" height="24" rx="4" fill="rgba(63,168,108,0.15)" stroke="rgba(63,168,108,0.3)" stroke-width="1"/>
  <text x="189" y="96" text-anchor="middle" fill="#3FA86C" font-size="11.5" font-weight="600"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">AI 加速</text>

  <!-- Question mark badge on 20% section -->
  <rect x="956" y="80" width="90" height="24" rx="4" fill="rgba(201,168,76,0.12)" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
  <text x="1001" y="96" text-anchor="middle" fill="#C9A84C" font-size="11.5" font-weight="600"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">仍靠人判断</text>

  <!-- Bottom comparison row -->
  <rect x="28" y="210" width="908" height="82" rx="7" fill="rgba(63,168,108,0.04)" stroke="rgba(63,168,108,0.12)" stroke-width="1"/>
  <text x="474" y="238" text-anchor="middle" fill="#8C7E6A" font-size="12" letter-spacing="1"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">过去更像</text>
  <text x="474" y="264" text-anchor="middle" fill="#ECE6D8" font-size="15" font-weight="600"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">简 答 题 — 考验你能不能把问题解出来</text>
  <text x="474" y="283" text-anchor="middle" fill="rgba(63,168,108,0.65)" font-size="11.5"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">执行能力越强，交付越好</text>

  <rect x="936" y="210" width="236" height="82" rx="7" fill="rgba(201,168,76,0.05)" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
  <text x="1054" y="238" text-anchor="middle" fill="#8C7E6A" font-size="12" letter-spacing="1"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">现在更像</text>
  <text x="1054" y="264" text-anchor="middle" fill="#EDD07C" font-size="15" font-weight="600"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">选 择 题</text>
  <text x="1054" y="283" text-anchor="middle" fill="rgba(201,168,76,0.65)" font-size="11.5"
        font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">判断力决定结果</text>
</svg>
