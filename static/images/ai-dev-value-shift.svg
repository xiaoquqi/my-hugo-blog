<svg width="840" height="320" viewBox="0 0 840 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif; }</style>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3182CE"/>
    </marker>
  </defs>

  <rect width="840" height="320" fill="#F7FAFC"/>

  <!-- Left box: 过去 -->
  <rect x="20" y="20" width="330" height="280" fill="white" rx="10" stroke="#E2E8F0" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="20" y="20" width="330" height="52" fill="#718096" rx="10"/>
  <rect x="20" y="58" width="330" height="14" fill="#718096"/>
  <text x="185" y="48" text-anchor="middle" font-size="15" fill="white" font-weight="700">传统核心能力</text>
  <text x="185" y="65" text-anchor="middle" font-size="11.5" fill="#E2E8F0">实现能力为主</text>
  <!-- Items -->
  <rect x="46" y="90" width="278" height="34" fill="#F7FAFC" rx="6"/>
  <text x="66" y="112" font-size="13.5" fill="#4A5568">会写代码 / 会写接口 / 会写页面</text>
  <rect x="46" y="132" width="278" height="34" fill="#F7FAFC" rx="6"/>
  <text x="66" y="154" font-size="13.5" fill="#4A5568">会调 Bug</text>
  <rect x="46" y="174" width="278" height="34" fill="#F7FAFC" rx="6"/>
  <text x="66" y="196" font-size="13.5" fill="#4A5568">会完成分配的任务</text>
  <rect x="46" y="216" width="278" height="34" fill="#F7FAFC" rx="6"/>
  <text x="66" y="238" font-size="13.5" fill="#4A5568">会使用专业工具</text>
  <rect x="46" y="258" width="278" height="22" fill="#EDF2F7" rx="6"/>
  <text x="185" y="274" text-anchor="middle" font-size="11.5" fill="#718096">AI 可以大量替代</text>

  <!-- Arrow -->
  <line x1="362" y1="160" x2="476" y2="160" stroke="#3182CE" stroke-width="3" marker-end="url(#arr)"/>
  <text x="420" y="148" text-anchor="middle" font-size="13" fill="#3182CE" font-weight="600">AI 介入</text>
  <text x="420" y="180" text-anchor="middle" font-size="11" fill="#718096">价值迁移</text>

  <!-- Right box: 现在 -->
  <rect x="490" y="20" width="330" height="280" fill="white" rx="10" stroke="#BEE3F8" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="490" y="20" width="330" height="52" fill="#3182CE" rx="10"/>
  <rect x="490" y="58" width="330" height="14" fill="#3182CE"/>
  <text x="655" y="48" text-anchor="middle" font-size="15" fill="white" font-weight="700">现在更重要的能力</text>
  <text x="655" y="65" text-anchor="middle" font-size="11.5" fill="#BEE3F8">判断能力为主</text>
  <!-- Items -->
  <rect x="516" y="90" width="278" height="34" fill="#EBF8FF" rx="6"/>
  <text x="536" y="112" font-size="13.5" fill="#2B6CB0">能定义问题 / 设计数据结构</text>
  <rect x="516" y="132" width="278" height="34" fill="#EBF8FF" rx="6"/>
  <text x="536" y="154" font-size="13.5" fill="#2B6CB0">能梳理关键流程与异常边界</text>
  <rect x="516" y="174" width="278" height="34" fill="#EBF8FF" rx="6"/>
  <text x="536" y="196" font-size="13.5" fill="#2B6CB0">能识别测试风险</text>
  <rect x="516" y="216" width="278" height="34" fill="#EBF8FF" rx="6"/>
  <text x="536" y="238" font-size="13.5" fill="#2B6CB0">能判断 AI 输出是否可靠</text>
  <rect x="516" y="258" width="278" height="22" fill="#EBF8FF" rx="6"/>
  <text x="655" y="274" text-anchor="middle" font-size="11.5" fill="#2B6CB0">能对最终结果负责</text>
</svg>
