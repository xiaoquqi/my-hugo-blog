<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="#f8fafc" rx="12"/>

  <!-- Mac Side -->
  <rect x="20" y="20" width="220" height="280" fill="#1e1e2e" rx="10"/>
  <rect x="20" y="20" width="220" height="36" fill="#2d2d3f" rx="10"/>
  <rect x="20" y="44" width="220" height="12" fill="#2d2d3f"/>
  <circle cx="40" cy="38" r="6" fill="#ff5f57"/>
  <circle cx="60" cy="38" r="6" fill="#ffbd2e"/>
  <circle cx="80" cy="38" r="6" fill="#28c840"/>
  <text x="130" y="43" text-anchor="middle" font-family="monospace" font-size="11" fill="#9ca3af">Terminal</text>

  <!-- Mac terminal content -->
  <text x="35" y="80" font-family="monospace" font-size="10" fill="#50fa7b">$ tmux new -s dev</text>
  <text x="35" y="100" font-family="monospace" font-size="10" fill="#8be9fd">$ cd ~/my-project</text>
  <text x="35" y="120" font-family="monospace" font-size="10" fill="#8be9fd">$ claude --rc</text>
  <text x="35" y="148" font-family="monospace" font-size="9" fill="#f1fa8c">✓ Remote Control 已启动</text>
  <text x="35" y="165" font-family="monospace" font-size="9" fill="#6272a4">Session: my-project-dev</text>
  <text x="35" y="182" font-family="monospace" font-size="9" fill="#6272a4">URL: claude.ai/code/rc/...</text>

  <!-- QR code simulation -->
  <rect x="55" y="198" width="110" height="82" fill="#ffffff" rx="4"/>
  <text x="110" y="218" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">按空格键显示二维码</text>
  <!-- QR code grid simulation -->
  <rect x="65" y="224" width="8" height="8" fill="#1e1e2e"/>
  <rect x="75" y="224" width="8" height="8" fill="#1e1e2e"/>
  <rect x="65" y="234" width="8" height="8" fill="#1e1e2e"/>
  <rect x="85" y="224" width="8" height="8" fill="#ffffff" stroke="#1e1e2e" stroke-width="0.5"/>
  <rect x="95" y="224" width="8" height="8" fill="#1e1e2e"/>
  <rect x="105" y="224" width="8" height="8" fill="#ffffff" stroke="#1e1e2e" stroke-width="0.5"/>
  <rect x="115" y="224" width="8" height="8" fill="#1e1e2e"/>
  <rect x="125" y="224" width="8" height="8" fill="#1e1e2e"/>
  <rect x="75" y="234" width="8" height="8" fill="#ffffff" stroke="#1e1e2e" stroke-width="0.5"/>
  <rect x="85" y="234" width="8" height="8" fill="#1e1e2e"/>
  <rect x="95" y="234" width="8" height="8" fill="#ffffff" stroke="#1e1e2e" stroke-width="0.5"/>
  <rect x="105" y="234" width="8" height="8" fill="#1e1e2e"/>
  <rect x="115" y="234" width="8" height="8" fill="#ffffff" stroke="#1e1e2e" stroke-width="0.5"/>
  <rect x="125" y="234" width="8" height="8" fill="#1e1e2e"/>
  <rect x="65" y="244" width="8" height="8" fill="#1e1e2e"/>
  <rect x="75" y="244" width="8" height="8" fill="#1e1e2e"/>
  <rect x="85" y="244" width="8" height="8" fill="#ffffff" stroke="#1e1e2e" stroke-width="0.5"/>
  <rect x="95" y="244" width="8" height="8" fill="#1e1e2e"/>
  <rect x="105" y="244" width="8" height="8" fill="#1e1e2e"/>
  <rect x="115" y="244" width="8" height="8" fill="#1e1e2e"/>
  <rect x="125" y="244" width="8" height="8" fill="#ffffff" stroke="#1e1e2e" stroke-width="0.5"/>
  <rect x="65" y="254" width="8" height="8" fill="#ffffff" stroke="#1e1e2e" stroke-width="0.5"/>
  <rect x="75" y="254" width="8" height="8" fill="#1e1e2e"/>
  <rect x="85" y="254" width="8" height="8" fill="#1e1e2e"/>
  <rect x="95" y="254" width="8" height="8" fill="#ffffff" stroke="#1e1e2e" stroke-width="0.5"/>
  <rect x="105" y="254" width="8" height="8" fill="#1e1e2e"/>
  <rect x="115" y="254" width="8" height="8" fill="#ffffff" stroke="#1e1e2e" stroke-width="0.5"/>
  <rect x="125" y="254" width="8" height="8" fill="#1e1e2e"/>
  <text x="110" y="290" text-anchor="middle" font-family="monospace" font-size="8" fill="#50fa7b">扫码连接手机</text>

  <!-- Mac label -->
  <text x="130" y="308" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#374151" font-weight="bold">Mac / 开发机</text>

  <!-- Arrow 1: Mac to Anthropic Cloud -->
  <line x1="245" y1="160" x2="380" y2="160" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <text x="312" y="152" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="10" fill="#6366f1">HTTPS 加密</text>
  <text x="312" y="168" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="9" fill="#9ca3af">仅出站连接</text>

  <!-- Anthropic Cloud middle -->
  <rect x="385" y="110" width="130" height="100" fill="#eef2ff" rx="10" stroke="#6366f1" stroke-width="1.5"/>
  <text x="450" y="136" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#4338ca" font-weight="bold">Anthropic</text>
  <text x="450" y="152" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#4338ca" font-weight="bold">Cloud</text>
  <text x="450" y="174" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="10" fill="#6366f1">安全中继</text>
  <text x="450" y="190" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="9" fill="#9ca3af">TLS 加密传输</text>
  <text x="450" y="206" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="9" fill="#9ca3af">代码不上云</text>

  <!-- Arrow 2: Cloud to Phone -->
  <line x1="520" y1="160" x2="648" y2="160" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <text x="583" y="152" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="10" fill="#6366f1">实时同步</text>

  <!-- Phone -->
  <rect x="652" y="50" width="110" height="220" fill="#1e1e2e" rx="16"/>
  <rect x="652" y="50" width="110" height="220" fill="none" rx="16" stroke="#374151" stroke-width="2"/>
  <rect x="685" y="58" width="44" height="6" fill="#374151" rx="3"/>
  <rect x="660" y="72" width="94" height="180" fill="#0f172a" rx="6"/>

  <!-- Phone screen content -->
  <rect x="664" y="76" width="86" height="20" fill="#6366f1" rx="3"/>
  <text x="707" y="90" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="8" fill="white">Claude Code</text>
  <rect x="664" y="100" width="86" height="12" fill="#1e293b" rx="2"/>
  <text x="707" y="110" text-anchor="middle" font-family="monospace" font-size="7" fill="#94a3b8">my-project-dev ●</text>
  <rect x="664" y="116" width="86" height="40" fill="#0f172a" rx="2"/>
  <text x="670" y="130" font-family="monospace" font-size="7" fill="#50fa7b">Claude: 已完成单</text>
  <text x="670" y="142" font-family="monospace" font-size="7" fill="#50fa7b">元测试修复...</text>
  <text x="670" y="154" font-family="monospace" font-size="7" fill="#f1fa8c">等待您确认</text>

  <!-- Voice input icon -->
  <rect x="664" y="162" width="86" height="28" fill="#1e293b" rx="4"/>
  <circle cx="695" cy="176" r="7" fill="#6366f1"/>
  <text x="695" y="179" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">🎤</text>
  <text x="730" y="174" font-family="PingFang SC, sans-serif" font-size="7" fill="#94a3b8">微信输入法</text>
  <text x="730" y="184" font-family="PingFang SC, sans-serif" font-size="7" fill="#94a3b8">语音转文字</text>

  <rect x="664" y="196" width="86" height="16" fill="#1e293b" rx="3"/>
  <text x="707" y="208" text-anchor="middle" font-family="monospace" font-size="7" fill="#8be9fd">继续执行 &gt;</text>

  <!-- Phone label -->
  <text x="707" y="285" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#374151" font-weight="bold">iPhone / Android</text>
  <text x="707" y="300" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="10" fill="#9ca3af">扫码即连接</text>

  <!-- tmux note -->
  <rect x="25" y="293" width="210" height="18" fill="#fef3c7" rx="4"/>
  <text x="130" y="306" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="9" fill="#92400e">tmux 保持会话，关闭终端不断连</text>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" fill="#1e293b" font-weight="bold">Claude Code Remote Control 工作原理</text>
</svg>
