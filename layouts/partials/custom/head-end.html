<script>
(function () {
  var key  = 'lang-pref';
  var path = window.location.pathname;
  var onEn = path.startsWith('/en');
  var onEs = path.startsWith('/es');

  if (onEn) { localStorage.setItem(key, 'en'); return; }
  if (onEs) { localStorage.setItem(key, 'es'); return; }

  // User navigated from a translated page back to Chinese — record as manual switch
  var refPath = '';
  try { refPath = !!document.referrer ? new URL(document.referrer).pathname : ''; } catch (e) {}
  if (refPath.startsWith('/en') || refPath.startsWith('/es')) {
    localStorage.setItem(key, 'zh');
    return;
  }

  var pref = localStorage.getItem(key);

  if (!pref) {
    if (path !== '/') { localStorage.setItem(key, 'zh'); return; }
    var lang = (navigator.languages && navigator.languages[0]) || navigator.language || '';
    var l = lang.toLowerCase();
    if (l.startsWith('en')) {
      localStorage.setItem(key, 'en');
      location.replace('/en/');
    } else if (l.startsWith('es')) {
      localStorage.setItem(key, 'es');
      location.replace('/es/');
    } else {
      localStorage.setItem(key, 'zh');
    }
    return;
  }

  if (path === '/') {
    if (pref === 'en') location.replace('/en/');
    else if (pref === 'es') location.replace('/es/');
  }
})();
</script>
